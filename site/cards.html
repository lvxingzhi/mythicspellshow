<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>大秘境副本技能速查 · 制作者: 西番芥</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", PingFang SC, "Microsoft Yahei", sans-serif;
    background: #f5f5f5;
    color: #333;
    padding: 12px 10px 40px;
    min-height: 100vh;
  }

  /* ===== 工具栏 ===== */
  .toolbar {
    max-width: 800px; margin: 0 auto 16px;
    padding: 8px 12px; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .toolbar select, .toolbar button {
    background: #fff; color: #333; border: 1px solid #d0d0d0;
    border-radius: 6px; padding: 5px 10px; font-size: 13px; cursor: pointer;
  }
  .toolbar select:hover, .toolbar button:hover { border-color: #999; }
  .toolbar .back {
    color: #333; text-decoration: none; font-weight: 600;
    padding: 5px 10px; border-radius: 6px; border: 1px solid #333; background: transparent;
  }
  .toolbar .back:hover { background: #333; color: #fff; }
  .toolbar .share-btn { background: #333; color: #fff; border: none; font-weight: 600; }
  .toolbar .share-btn:hover { background: #555; }
  .toolbar .hint { color: #888; font-size: 11px; margin-left: auto; }

  /* ===== 卡片容器 ===== */
  .cards { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

  /* ===== 单张卡片 ===== */
  .card {
    background: #fff; border-radius: 10px; border: 1px solid #e0e0e0;
    position: relative; overflow: hidden;
    page-break-inside: avoid;
  }

  /* ===== 水印层 ===== */
  .watermark-layer {
    position: absolute; inset: 0;
    pointer-events: none; user-select: none;
    z-index: 10; overflow: hidden;
  }
  .watermark-layer svg { width: 100%; height: 100%; }

  /* ===== 卡片头部 ===== */
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid #eee;
    display: flex; align-items: center; gap: 10px;
    position: relative; z-index: 1;
    background: linear-gradient(90deg, rgba(245,181,63,.08), #fff);
  }
  .card-title-wrap { flex: 1; min-width: 0; }
  .card-title {
    font-size: 20px; font-weight: 800; color: #b8740d; line-height: 1.2;
    text-shadow: 0 1px 3px rgba(245,181,63,.2);
  }
  .card-title-en { margin-top: 1px; font-size: 11px; color: #888; font-style: italic; }
  .card-season {
    background: linear-gradient(135deg, #a78bfa, #6d28d9); color: #fff;
    padding: 3px 10px; border-radius: 99px;
    font-size: 10px; font-weight: 700; letter-spacing: .5px; white-space: nowrap;
    box-shadow: 0 2px 6px rgba(109,40,217,.3);
  }

  /* ===== 怪物分组 ===== */
  .mob-list { padding: 8px 10px; position: relative; z-index: 1; }
  .mob-block {
    margin-bottom: 6px; border: 1px solid #e8e8e8; border-radius: 6px;
    overflow: hidden; position: relative;
  }
  .mob-block:last-child { margin-bottom: 0; }
  .mob-block.is-boss { border-color: #c62828; border-width: 1.5px; }

  .mob-header {
    padding: 6px 10px; background: #fafafa;
    border-bottom: 1px solid #eee; border-left: 3px solid #d4a04a;
    display: flex; align-items: center; gap: 6px;
  }
  .mob-block.is-boss .mob-header { border-left-color: #c62828; background: #fff5f5; }
  .boss-badge {
    background: linear-gradient(135deg, #ef5350, #b71c1c); color: #fff; font-weight: 900; font-size: 10px;
    padding: 1px 6px; border-radius: 3px; letter-spacing: 1px;
  }
  .mob-name-zh { font-size: 13px; font-weight: 800; color: #3a2a10; }
  .mob-block.is-boss .mob-name-zh { color: #c62828; }
  .mob-name-en { font-size: 10px; color: #999; font-style: italic; margin-left: 3px; }
  .mob-count {
    margin-left: auto; font-size: 10px; color: #8b6914; font-weight: 700;
    background: rgba(245,181,63,.10); border: 1px solid rgba(245,181,63,.25);
    padding: 1px 7px; border-radius: 8px;
  }

  /* ===== 技能列表 ===== */
  .spell-list { padding: 0; }
  .spell-row {
    padding: 5px 10px;
    border-bottom: 1px dashed #f0f0f0;
    position: relative;
  }
  .spell-row:last-child { border-bottom: none; }

  /* 技能行内水印 */
  .spell-row-watermark {
    position: absolute; right: 6px; top: 50%;
    transform: translateY(-50%) rotate(-8deg);
    font-size: 9px; font-weight: 700;
    color: rgba(0,0,0,.05);
    letter-spacing: 1px;
    pointer-events: none; user-select: none;
    white-space: nowrap;
  }

  /* 技能名 + 描述 同行 */
  .spell-name { font-size: 13px; font-weight: 700; color: #1565c0; }
  .spell-desc-inline { font-size: 12px; color: #555; margin-left: 6px; }
  .spell-tags {
    display: inline-flex; flex-wrap: wrap; gap: 3px; margin-left: 6px;
    vertical-align: middle;
  }
  .spell-meta { font-size: 10px; color: #999; margin-top: 1px; }

  /* ===== 标签 ===== */
  .tag {
    display: inline-block; padding: 1px 5px; border-radius: 3px;
    font-size: 10px; font-weight: 700; line-height: 1.4;
    border: 1px solid transparent; white-space: nowrap;
  }
  .tag-int { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
  .tag-mag { background: #f3e5f5; color: #6a1b9a; border-color: #ce93d8; }
  .tag-enrage { background: #fce4ec; color: #c62828; border-color: #ef9a9a; }
  .tag-bleed { background: #fff3e0; color: #bf360c; border-color: #ffab91; }
  .tag-poison { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
  .tag-disease { background: #f1f8e9; color: #558b2f; border-color: #c5e1a5; }
  .tag-curse { background: #f3e5f5; color: #6a1b9a; border-color: #ce93d8; }

  /* ===== 底部 ===== */
  .card-footer {
    background: linear-gradient(90deg, rgba(245,181,63,.06), #fff);
    border-top: 1px solid rgba(245,181,63,.20);
    padding: 6px 14px; display: flex; align-items: center; gap: 12px;
    position: relative; z-index: 1;
  }
  .footer-brand { font-size: 11px; font-weight: 700; color: #b8740d; }
  .footer-social { margin-left: auto; text-align: right; font-size: 9px; color: #888; line-height: 1.3; }
  .footer-social .hl { color: #b8740d; font-weight: 700; }

  /* ===== 分享模式 ===== */
  body.share-mode .toolbar { display: none; }
  body.share-mode { padding: 8px 8px 24px; }
  body.share-mode .cards { gap: 12px; }
  body.share-mode .card-header { padding: 10px 12px; }
  body.share-mode .card-title { font-size: 17px; }
  body.share-mode .mob-list { padding: 6px 8px; }
  body.share-mode .spell-row { padding: 4px 8px; }
  /* 分享模式水印更明显 */
  body.share-mode .watermark-layer svg text { fill: rgba(0,0,0,.06); }
  body.share-mode .spell-row-watermark { color: rgba(0,0,0,.08); }

  /* ===== 空状态 ===== */
  .empty { text-align: center; padding: 60px 20px; color: #888; font-size: 14px; }

  /* ===== 响应式 ===== */
  @media (max-width: 720px) {
    body { padding: 8px 6px 30px; }
    .card-title { font-size: 17px; }
    .mob-name-zh { font-size: 12px; }
    .spell-name { font-size: 12px; }
    .spell-desc-inline { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <a href="index.html" class="back">&larr; 返回</a>
  <select id="season"><option value="">全部赛季</option></select>
  <select id="dungeon"><option value="">全部副本</option></select>
  <button type="button" class="share-btn" id="shareBtn">分享模式</button>
  <span class="hint">长截图分享</span>
</div>

<div class="cards" id="cards"></div>

<script>
const WATERMARK = "制作者:西番芥";
const BILIBILI_ID = "346688237";

const ESC = { "\u0026": "\u0026amp;", "\u003c": "\u0026lt;", "\u003e": "\u0026gt;", "\u0022": "\u0026quot;", "\u0027": "\u0026#39;" };
const escapeHtml = (s) => String(s == null ? "" : s).replace(/[\u0026\u003c\u003e\u0022\u0027]/g, (c) => ESC[c]);

/* 生成SVG平铺水印 */
function buildWatermarkSvg(idx) {
  /* 用SVG pattern实现真正的平铺重复水印，保证覆盖整个卡片 */
  const text = WATERMARK;
  const id = "wm" + idx;
  return '<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%">' +
    '<defs>' +
      '<pattern id="' + id + '" x="0" y="0" width="320" height="200" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)">' +
        '<text x="10" y="80" font-size="14" font-weight="600" fill="rgba(0,0,0,.03)" letter-spacing="3" ' +
          'font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Microsoft Yahei,sans-serif">' +
          escapeHtml(text) +
        '</text>' +
      '</pattern>' +
    '</defs>' +
    '<rect width="100%" height="100%" fill="url(#' + id + ')"/>' +
  '</svg>';
}

let allRows = [], allDungeons = [], allSeasons = [];

async function load() {
  const res = await fetch("data.json", { cache: "no-cache" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();

  allSeasons = Object.keys(data.seasons || {});
  allDungeons = data.dungeons || [];
  allRows = data.rows || [];

  const sSel = document.getElementById("season");
  allSeasons.forEach((s) => {
    const opt = document.createElement("option");
    opt.value = s; opt.textContent = s;
    sSel.appendChild(opt);
  });

  const dSel = document.getElementById("dungeon");
  allDungeons.forEach((d) => {
    const opt = document.createElement("option");
    opt.value = d.name; opt.textContent = d.name;
    dSel.appendChild(opt);
  });

  render();
}

function buildSpellTags(r) {
  const allDebuffsTrue = r.isEnrage && r.isBleed && r.isPoison && r.isDisease && r.isCurse;
  const tags = [];
  if (r.interruptible) tags.push('<span class="tag tag-int">可打断</span>');
  if (r.isMagic) tags.push('<span class="tag tag-mag">魔法</span>');
  if (!allDebuffsTrue) {
    if (r.isEnrage) tags.push('<span class="tag tag-enrage">激怒</span>');
    if (r.isBleed) tags.push('<span class="tag tag-bleed">流血</span>');
    if (r.isPoison) tags.push('<span class="tag tag-poison">中毒</span>');
    if (r.isDisease) tags.push('<span class="tag tag-disease">疾病</span>');
    if (r.isCurse) tags.push('<span class="tag tag-curse">诅咒</span>');
  }
  return tags.join("");
}

function render() {
  const season = document.getElementById("season").value;
  const dungeon = document.getElementById("dungeon").value;
  const container = document.getElementById("cards");

  let rows = allRows;
  if (season) rows = rows.filter((r) => r.season === season);
  if (dungeon) rows = rows.filter((r) => r.dungeonZh === dungeon);

  const dedupSeen = new Set();
  rows = rows.filter((r) => {
    const tagSig = [r.interruptible, r.isMagic, r.isEnrage, r.isBleed, r.isPoison, r.isDisease, r.isCurse]
      .map((b) => (b ? 1 : 0)).join("");
    const key = [
      r.dungeonZh || "",
      r.npcId || r.mobZh || "",
      (r.spellName || "").trim(),
      (r.description || "").trim(),
      tagSig,
    ].join("||");
    if (dedupSeen.has(key)) return false;
    dedupSeen.add(key);
    return true;
  });

  const groups = {};
  for (const r of rows) {
    const key = r.dungeonZh || "未知";
    if (!groups[key]) groups[key] = { dungeonZh: key, dungeonEn: r.dungeonEn, season: r.season, rows: [] };
    groups[key].rows.push(r);
  }

  const dungeonNames = Object.keys(groups);
  if (!dungeonNames.length) {
    container.innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }

  container.innerHTML = dungeonNames.map((name, idx) => {
    const g = groups[name];

    const mobs = {}; const mobOrder = [];
    for (const r of g.rows) {
      const k = (r.npcId || r.mobZh) + "|" + r.mobZh;
      if (!mobs[k]) {
        mobs[k] = { mobZh: r.mobZh, mobEn: r.mobEn, isBoss: r.isBoss, spells: [] };
        mobOrder.push(k);
      }
      mobs[k].spells.push(r);
    }
    mobOrder.sort((a, b) => (mobs[b].isBoss ? 1 : 0) - (mobs[a].isBoss ? 1 : 0));

    const mobsHtml = mobOrder.map((k) => {
      const m = mobs[k];
      const spellsHtml = m.spells.map((r) => {
        const tags = buildSpellTags(r);
        const descHtml = r.description
          ? '<span class="spell-desc-inline">' + escapeHtml(r.description) + '</span>'
          : '';
        const tagsHtml = tags ? '<span class="spell-tags">' + tags + '</span>' : '';

        return '<div class="spell-row">' +
          '<div>' +
            '<span class="spell-name">' + escapeHtml(r.spellName) + '</span>' +
            descHtml +
            tagsHtml +
          '</div>' +
          '<span class="spell-row-watermark">' + WATERMARK + '</span>' +
          '</div>';
      }).join("");

      return '<div class="mob-block' + (m.isBoss ? ' is-boss' : '') + '">' +
        '<div class="mob-header">' +
          (m.isBoss ? '<span class="boss-badge">BOSS</span>' : '') +
          '<span class="mob-name-zh">' + escapeHtml(m.mobZh) + '</span>' +
          '<span class="mob-name-en">' + escapeHtml(m.mobEn) + '</span>' +
          '<span class="mob-count">' + m.spells.length + ' 技能</span>' +
        '</div>' +
        '<div class="spell-list">' + spellsHtml + '</div>' +
        '</div>';
    }).join("");

    return '<div class="card">' +
      '<div class="watermark-layer">' + buildWatermarkSvg(idx) + '</div>' +
      '<div class="card-header">' +
        '<div class="card-title-wrap">' +
          '<div class="card-title">' + escapeHtml(g.dungeonZh) + '</div>' +
          '<div class="card-title-en">' + escapeHtml(g.dungeonEn || '') + '</div>' +
        '</div>' +
        '<span class="card-season">' + escapeHtml(g.season) + '</span>' +
      '</div>' +
      '<div class="mob-list">' + mobsHtml + '</div>' +
      '<div class="card-footer">' +
        '<span class="footer-brand">制作者: 西番芥</span>' +
        '<span class="footer-social">' +
          'B站 <span class="hl">西番芥</span> · space.bilibili.com/' + BILIBILI_ID +
        '</span>' +
      '</div>' +
      '</div>';
  }).join("");
}

document.getElementById("season").addEventListener("change", render);
document.getElementById("dungeon").addEventListener("change", render);
document.getElementById("shareBtn").addEventListener("click", () => {
  document.body.classList.toggle("share-mode");
  const btn = document.getElementById("shareBtn");
  btn.textContent = document.body.classList.contains("share-mode") ? "退出分享模式" : "分享模式";
});

load();
</script>
</body>
</html>
