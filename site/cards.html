  [data-theme="minimal"] .mob-block.is-boss .mob-count { color: #fff; background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.25); }

  /* ============================================================
     通用样式 (使用变量,与主题无关)
     ============================================================ */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--page-bg); color: var(--text); -webkit-font-smoothing: antialiased; transition: background .25s; }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", PingFang SC, "Microsoft Yahei", sans-serif;
    min-height: 100vh;
    padding: 20px 12px 60px;
    background: var(--page-glow), var(--page-bg);
    transition: background .25s, color .25s;
  }

  /* ===== 顶部工具栏 ===== */
  .toolbar {
    max-width: 1080px;
    margin: 0 auto 24px;
    padding: 12px 16px;
    background: var(--toolbar-bg);
    border: 1px solid var(--toolbar-border);
    border-radius: 14px;
    backdrop-filter: blur(8px);
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .toolbar select, .toolbar button {
    background: var(--select-bg); color: var(--text); border: 1px solid var(--toolbar-border);
    border-radius: 8px; padding: 7px 14px; font-size: 14px; cursor: pointer;
    transition: all .15s;
  }
  .toolbar select:hover, .toolbar button:hover { border-color: var(--accent); }
  .toolbar .back {
    color: var(--accent); text-decoration: none; font-weight: 700;
    padding: 7px 14px; border-radius: 8px;
    border: 1px solid var(--accent); background: transparent;
  }
  .toolbar .back:hover { background: var(--accent); color: var(--accent-on); }
  .toolbar .share-btn {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
    color: var(--accent-on); border: none; font-weight: 700;
  }
  .toolbar .share-btn:hover { filter: brightness(1.08); }
  .toolbar .hint { color: var(--muted); font-size: 12px; margin-left: auto; }

  /* ===== 卡片容器 ===== */
  .cards {
    max-width: 1080px;
    margin: 0 auto;
    display: flex; flex-direction: column; gap: 32px;
  }

  .card {
    width: 100%;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    background: var(--card-bg-grad) padding-box, var(--card-border-grad) border-box;
    border: 2px solid transparent;
    box-shadow: var(--card-shadow);
    page-break-inside: avoid;
  }

  .card::before {
    content: "";
    position: absolute; top: 0; left: 0; right: 0; height: 180px;
    background: var(--card-top-glow);
    pointer-events: none; z-index: 0;
  }
  .card::after {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(var(--rune-dot-1) 1px, transparent 1px),
      radial-gradient(var(--rune-dot-2) 1px, transparent 1px);
    background-size: 32px 32px, 32px 32px;
    background-position: 0 0, 16px 16px;
    pointer-events: none; opacity: .8; z-index: 0;
  }

  /* ===== 卡片头部 ===== */
  .card-header {
    position: relative;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--header-border);
    display: flex; align-items: center; gap: 14px;
    z-index: 1;
  }
  .card-logo {
    width: 48px; height: 48px;
    background: var(--logo-bg);
    color: var(--accent-on); font-weight: 900; font-size: 24px;
    display: grid; place-items: center;
    flex-shrink: 0;
    border-radius: 12px;
    box-shadow: var(--logo-shadow);
    font-family: "STKaiti", "KaiTi", "PingFang SC", serif;
  }
  .card-title-wrap { flex: 1; min-width: 0; }
  .card-title {
    font-size: 22px; font-weight: 800;
    color: var(--accent-2);
    text-shadow: var(--title-shadow);
    letter-spacing: 1px;
    line-height: 1.2;
  }
  .card-title-en {
    margin-top: 2px;
    font-size: 12px; color: var(--muted);
    font-style: italic;
    letter-spacing: .5px;
  }
  .card-season {
    background: var(--season-bg);
    color: var(--season-c);
    padding: 5px 12px; border-radius: 999px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px;
    box-shadow: var(--season-shadow);
    white-space: nowrap;
  }

  /* ===== 统计条 ===== */
  .card-stats {
    display: flex; gap: 0;
    background: var(--stats-bg);
    border-bottom: 1px solid var(--stats-border);
    position: relative; z-index: 1;
  }
  .stat-item {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    border-right: 1px solid var(--mob-divider);
  }
  .stat-item:last-child { border-right: none; }
  .stat-num {
    font-size: 20px; font-weight: 800;
    line-height: 1;
    margin-bottom: 3px;
  }
  .stat-num.total { color: var(--accent-2); }
  .stat-num.int { color: var(--danger); }
  .stat-num.mag { color: var(--aux); }
  .stat-num.boss { color: var(--accent); }
  .stat-label {
    font-size: 10px; color: var(--muted);
    letter-spacing: 1px;
  }

  /* ===== 怪物分组 ===== */
  .mob-list {
    padding: 14px 16px;
    position: relative; z-index: 1;
  }
  .mob-block {
    margin-bottom: 14px;
    background: var(--mob-bg);
    border: 1px solid var(--mob-border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .mob-block:last-child { margin-bottom: 0; }
  .mob-block.is-boss {
    border-color: var(--boss-border);
    background: var(--boss-bg);
    box-shadow: var(--boss-shadow);
  }

  /* 小怪头部:左侧加色块条,名字更醒目 */
  .mob-header {
    padding: 10px 14px;
    background: var(--mob-header-bg);
    border-bottom: 1px solid var(--mob-divider);
    display: flex; align-items: center; gap: 10px;
    border-left: 4px solid var(--aux);
  }
  .mob-block.is-boss .mob-header {
    background: var(--boss-header-bg);
    border-left: 4px solid var(--accent);
    padding: 12px 14px;
  }
  .boss-badge {
    background: var(--logo-bg);
    color: var(--accent-on); font-weight: 900; font-size: 11px;
    padding: 3px 9px; border-radius: 5px;
    letter-spacing: 1.5px;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  /* 普通怪物名:加大 + 加粗 + 主题强调色 */
  .mob-name-zh {
    font-size: 16px; font-weight: 800;
    color: var(--mob-name-color);
    letter-spacing: .5px;
    text-shadow: var(--mob-name-shadow);
  }
  /* BOSS 名:再大一档 + 主题主色发光 */
  .mob-block.is-boss .mob-name-zh {
    font-size: 18px;
    color: var(--accent-2);
    text-shadow: var(--title-shadow);
    letter-spacing: 1px;
  }
  .mob-name-en {
    font-size: 11px; color: var(--muted);
    font-style: italic; margin-left: 4px;
    font-weight: 500;
  }
  .mob-count {
    margin-left: auto;
    font-size: 11px; color: var(--text); font-weight: 600;
    background: var(--mob-count-bg);
    border: 1px solid var(--mob-count-border);
    padding: 2px 9px; border-radius: 10px;
  }

  /* ===== 技能列表 ===== */
  .spell-list { padding: 2px 0; }
  .spell-row {
    padding: 9px 14px;
    border-bottom: 1px dashed var(--mob-divider);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 6px 12px;
    align-items: start;
  }
  .spell-row:last-child { border-bottom: none; }
  .spell-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .spell-name {
    font-size: 15px; font-weight: 800;
    color: var(--link);
    line-height: 1.3;
    letter-spacing: .3px;
  }
  .spell-meta { font-size: 11px; color: var(--muted); font-weight: 500; }
  .spell-desc {
    font-size: 13px; color: var(--desc-text);
    line-height: 1.55;
    grid-column: 1 / -1;
    padding: 7px 12px;
    background: var(--desc-bg);
    border-left: 3px solid var(--aux);
    border-radius: 0 5px 5px 0;
  }
  .spell-counter {
    font-size: 13px; color: var(--accent-deep);
    line-height: 1.55;
    grid-column: 1 / -1;
    padding: 7px 12px;
    background: var(--counter-bg);
    border-left: 3px solid var(--accent);
    border-radius: 0 5px 5px 0;
    font-weight: 700;
  }
  .spell-counter::before { content: "💡 "; }
  .spell-tags {
    display: flex; flex-wrap: wrap; gap: 4px;
    justify-content: flex-end;
    align-items: flex-start;
    max-width: 180px;
  }

  /* ===== 标签 ===== */
  .tag {
    display: inline-block; padding: 3px 8px; border-radius: 5px;
    font-size: 11px; font-weight: 800; line-height: 1.4;
    letter-spacing: .5px;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .tag-int { background: var(--tag-int-bg); color: var(--tag-int-c); border-color: var(--tag-int-bd); }
  .tag-mag { background: var(--tag-mag-bg); color: var(--tag-mag-c); border-color: var(--tag-mag-bd); }
  .tag-enrage { background: var(--tag-enrage-bg); color: var(--tag-enrage-c); border-color: var(--tag-enrage-bd); }
  .tag-bleed { background: var(--tag-bleed-bg); color: var(--tag-bleed-c); border-color: var(--tag-bleed-bd); }
  .tag-poison { background: var(--tag-poison-bg); color: var(--tag-poison-c); border-color: var(--tag-poison-bd); }
  .tag-disease { background: var(--tag-disease-bg); color: var(--tag-disease-c); border-color: var(--tag-disease-bd); }
  .tag-curse { background: var(--tag-curse-bg); color: var(--tag-curse-c); border-color: var(--tag-curse-bd); }

  /* ===== 水印 ===== */
  .watermark-big {
    position: absolute;
    bottom: 80px; right: -30px;
    font-size: 72px; font-weight: 900;
    color: var(--watermark-big-color);
    letter-spacing: 8px;
    transform: rotate(-18deg);
    pointer-events: none; user-select: none;
    font-family: "STKaiti", "KaiTi", serif;
    z-index: 1;
  }
  .watermark-mid {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-18deg);
    font-size: 60px; font-weight: 900;
    color: var(--watermark-mid-color);
    letter-spacing: 12px;
    pointer-events: none; user-select: none;
    white-space: nowrap;
    z-index: 0;
  }

  /* ===== 底部品牌条 ===== */
  .card-footer {
    position: relative; z-index: 2;
    background: var(--footer-bg);
    border-top: 1px solid var(--footer-border);
    padding: 10px 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .footer-logo {
    width: 28px; height: 28px;
    background: var(--logo-bg);
    color: var(--accent-on); font-weight: 900; font-size: 14px;
    display: grid; place-items: center;
    border-radius: 6px;
    font-family: "STKaiti", "KaiTi", serif;
    flex-shrink: 0;
  }
  .footer-brand { display: flex; flex-direction: column; line-height: 1.2; }
  .footer-name { font-size: 12px; font-weight: 700; color: var(--accent-2); }
  .footer-tag { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .footer-social {
    margin-left: auto; text-align: right;
    font-size: 10px; color: var(--muted); line-height: 1.4;
  }
  .footer-social .hl { color: var(--accent); font-weight: 700; }

  /* ===== 分享模式 ===== */
  body.share-mode .toolbar { display: none; }
  body.share-mode { padding: 12px 12px 40px; }
  body.share-mode .cards { gap: 40px; }

  /* ===== 空状态 ===== */
  .empty {
    text-align: center; padding: 80px 20px;
    color: var(--muted); font-size: 16px;
  }

  /* ===== 响应式 ===== */
  @media (max-width: 720px) {
    body { padding: 12px 8px 40px; }
    .card-header { padding: 14px 14px 12px; gap: 10px; }
    .card-logo { width: 40px; height: 40px; font-size: 20px; border-radius: 10px; }
    .card-title { font-size: 18px; letter-spacing: .5px; }
    .card-title-en { font-size: 10px; }
    .card-season { padding: 3px 9px; font-size: 10px; }
    .stat-item { padding: 8px 6px; }
    .stat-num { font-size: 18px; }
    .stat-label { font-size: 9px; letter-spacing: .5px; }
    .mob-list { padding: 10px 10px; }
    .mob-block { margin-bottom: 12px; border-radius: 8px; }
    .mob-header { padding: 9px 12px; border-left-width: 3px; }
    .mob-block.is-boss .mob-header { padding: 10px 12px; border-left-width: 3px; }
    .mob-name-zh { font-size: 15px; }
    .mob-block.is-boss .mob-name-zh { font-size: 17px; }
    .mob-name-en { font-size: 10px; }
    .mob-count { font-size: 10px; padding: 1px 7px; }
    .spell-row { padding: 8px 12px; grid-template-columns: 1fr; gap: 5px; }
    .spell-tags { max-width: none; justify-content: flex-start; }
    .spell-name { font-size: 14px; }
    .spell-desc, .spell-counter { font-size: 12px; padding: 6px 10px; }
    .tag { font-size: 10px; padding: 2px 7px; }
    .watermark-big { font-size: 44px; bottom: 50px; }
    .watermark-mid { font-size: 36px; letter-spacing: 6px; }
    .card-footer { padding: 8px 12px; gap: 8px; }
    .footer-logo { width: 26px; height: 26px; font-size: 13px; }
    .footer-name { font-size: 11px; }
    .footer-tag, .footer-social { font-size: 9px; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <a href="index.html" class="back">← 返回查询站</a>
  <select id="theme" title="切换主题">
    <option value="dark">🌙 WoW 魔幻暗夜</option>
    <option value="light">🌸 小红书奶油</option>
    <option value="cyber">⚡ 赛博朋克霓虹</option>
    <option value="parchment">📜 复古羊皮卷轴</option>
    <option value="minimal">⚪ Ins 极简纸卡</option>
  </select>
  <select id="season"><option value="">全部赛季</option></select>
  <select id="dungeon"><option value="">全部副本</option></select>
  <button type="button" class="share-btn" id="shareBtn">📷 分享模式</button>
  <span class="hint">长截图分享到小红书/抖音/B站</span>
</div>

<div class="cards" id="cards"></div>

<script>
const BRAND = "西番芥的秘境工具箱";
const BILIBILI_ID = "346688237";
const THEME_KEY = "mss_theme_v1";

const ESC = { "\u0026": "\u0026amp;", "\u003c": "\u0026lt;", "\u003e": "\u0026gt;", "\u0022": "\u0026quot;", "\u0027": "\u0026#39;" };
const escapeHtml = (s) => String(s == null ? "" : s).replace(/[\u0026\u003c\u003e\u0022\u0027]/g, (c) => ESC[c]);

let allRows = [], allDungeons = [], allSeasons = [];

/* ========== 主题切换 ========== */
function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
  const sel = document.getElementById("theme");
  if (sel && sel.value !== theme) sel.value = theme;
}
function initTheme() {
  let saved = "dark";
  try { saved = localStorage.getItem(THEME_KEY) || "dark"; } catch (e) {}
  applyTheme(saved);
  document.getElementById("theme").addEventListener("change", (e) => applyTheme(e.target.value));
}

async function load() {
  const res = await fetch("data.json", { cache: "no-cache" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();

  allSeasons = Object.keys(data.seasons || {});
  allDungeons = data.dungeons || [];
  allRows = data.rows || [];

  const sSel = document.getElementById("season");
  allSeasons.forEach((s) => {
    const opt = document.createElement("option");
    opt.value = s; opt.textContent = s;
    sSel.appendChild(opt);
  });

  const dSel = document.getElementById("dungeon");
  allDungeons.forEach((d) => {
    const opt = document.createElement("option");
    opt.value = d.name; opt.textContent = d.name;
    dSel.appendChild(opt);
  });

  render();
}

function buildSpellTags(r) {
  const tags = [];
  if (r.interruptible) tags.push('<span class="tag tag-int">可打断</span>');
  if (r.isMagic) tags.push('<span class="tag tag-mag">魔法</span>');
  if (r.isEnrage) tags.push('<span class="tag tag-enrage">激怒</span>');
  if (r.isBleed) tags.push('<span class="tag tag-bleed">流血</span>');
  if (r.isPoison) tags.push('<span class="tag tag-poison">中毒</span>');
  if (r.isDisease) tags.push('<span class="tag tag-disease">疾病</span>');
  if (r.isCurse) tags.push('<span class="tag tag-curse">诅咒</span>');
  return tags.join("");
}

function render() {
  const season = document.getElementById("season").value;
  const dungeon = document.getElementById("dungeon").value;
  const container = document.getElementById("cards");

  let rows = allRows;
  if (season) rows = rows.filter((r) => r.season === season);
  if (dungeon) rows = rows.filter((r) => r.dungeonZh === dungeon);

  // 分享卡去重: 同一副本+怪物下, 技能名 + 描述 + 应对 + 标签组合相同的视为重复, 仅展示一条
  // 原始 allRows 保持不变, 只影响展示
  const dedupSeen = new Set();
  rows = rows.filter((r) => {
    const tagSig = [r.interruptible, r.isMagic, r.isEnrage, r.isBleed, r.isPoison, r.isDisease, r.isCurse]
      .map((b) => (b ? 1 : 0)).join("");
    const key = [
      r.dungeonZh || "",
      r.npcId || r.mobZh || "",
      (r.spellName || "").trim(),
      (r.description || "").trim(),
      (r.counter || "").trim(),
      tagSig,
    ].join("||");
    if (dedupSeen.has(key)) return false;
    dedupSeen.add(key);
    return true;
  });

  const groups = {};
  for (const r of rows) {
    const key = r.dungeonZh || "未知";
    if (!groups[key]) groups[key] = { dungeonZh: key, dungeonEn: r.dungeonEn, season: r.season, rows: [] };
    groups[key].rows.push(r);
  }

  const dungeonNames = Object.keys(groups);
  if (!dungeonNames.length) {
    container.innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }

  container.innerHTML = dungeonNames.map((name) => {
    const g = groups[name];
    const intCnt = g.rows.filter((r) => r.interruptible).length;
    const magCnt = g.rows.filter((r) => r.isMagic).length;
    const bossSet = new Set();
    g.rows.forEach((r) => { if (r.isBoss) bossSet.add(r.mobZh); });
    const bossCnt = bossSet.size;

    const mobs = {}; const mobOrder = [];
    for (const r of g.rows) {
      const k = (r.npcId || r.mobZh) + "|" + r.mobZh;
      if (!mobs[k]) {
        mobs[k] = { mobZh: r.mobZh, mobEn: r.mobEn, isBoss: r.isBoss, spells: [] };
        mobOrder.push(k);
      }
      mobs[k].spells.push(r);
    }
    mobOrder.sort((a, b) => (mobs[b].isBoss ? 1 : 0) - (mobs[a].isBoss ? 1 : 0));

    const mobsHtml = mobOrder.map((k) => {
      const m = mobs[k];
      const spellsHtml = m.spells.map((r) => {
        const tags = buildSpellTags(r);
        const desc = r.description ? '<div class="spell-desc">' + escapeHtml(r.description) + '</div>' : '';
        const counter = r.counter ? '<div class="spell-counter">' + escapeHtml(r.counter) + '</div>' : '';
        return '<div class="spell-row">' +
          '<div class="spell-main">' +
            '<div class="spell-name">' + escapeHtml(r.spellName) + '</div>' +
            '<div class="spell-meta">ID ' + escapeHtml(r.spellId) + '</div>' +
          '</div>' +
          '<div class="spell-tags">' + (tags || '<span class="spell-meta">—</span>') + '</div>' +
          desc + counter +
          '</div>';
      }).join("");

      return '<div class="mob-block' + (m.isBoss ? ' is-boss' : '') + '">' +
        '<div class="mob-header">' +
          (m.isBoss ? '<span class="boss-badge">BOSS</span>' : '') +
          '<span class="mob-name-zh">' + escapeHtml(m.mobZh) + '</span>' +
      '<span class="mob-name-en">' + escapeHtml(m.mobEn) + '</span>' +
          '<span class="mob-count">' + m.spells.length + ' 技能</span>' +
        '</div>' +
        '<div class="spell-list">' + spellsHtml + '</div>' +
        '</div>';
    }).join("");

    return '<div class="card">' +
      '<div class="watermark-mid">西番芥 · 西番芥 · 西番芥</div>' +
      '<div class="watermark-big">西番芥</div>' +
      '<div class="card-header">' +
        '<div class="card-logo">西</div>' +
        '<div class="card-title-wrap">' +
          '<div class="card-title">' + escapeHtml(g.dungeonZh) + '</div>' +
          '<div class="card-title-en">' + escapeHtml(g.dungeonEn || '') + '</div>' +
        '</div>' +
        '<span class="card-season">' + escapeHtml(g.season) + '</span>' +
      '</div>' +
      '<div class="card-stats">' +
        '<div class="stat-item"><div class="stat-num total">' + g.rows.length + '</div><div class="stat-label">技能总数</div></div>' +
        '<div class="stat-item"><div class="stat-num int">' + intCnt + '</div><div class="stat-label">可打断</div></div>' +
        '<div class="stat-item"><div class="stat-num mag">' + magCnt + '</div><div class="stat-label">可驱散</div></div>' +
        '<div class="stat-item"><div class="stat-num boss">' + bossCnt + '</div><div class="stat-label">BOSS</div></div>' +
      '</div>' +
      '<div class="mob-list">' + mobsHtml + '</div>' +
      '<div class="card-footer">' +
        '<div class="footer-logo">西</div>' +
        '<div class="footer-brand">' +
          '<div class="footer-name">' + BRAND + '</div>' +
          '<div class="footer-tag">WoW 大秘境技能速查 · 数据基于 MythicDungeonTools</div>' +
        '</div>' +
        '<div class="footer-social">' +
          'B站 <span class="hl">西番芥</span><br>' +
          'space.bilibili.com/' + BILIBILI_ID +
        '</div>' +
      '</div>' +
      '</div>';
  }).join("");
}

document.getElementById("season").addEventListener("change", render);
document.getElementById("dungeon").addEventListener("change", render);
document.getElementById("shareBtn").addEventListener("click", () => {
  document.body.classList.toggle("share-mode");
  const btn = document.getElementById("shareBtn");
  btn.textContent = document.body.classList.contains("share-mode") ? "✕ 退出分享模式" : "📷 分享模式";
});

initTheme();
load();
</script>
